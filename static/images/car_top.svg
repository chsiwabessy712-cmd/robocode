<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Car body -->
  <rect x="18" y="8" width="28" height="48" rx="10" ry="10" fill="#e74c3c"/>
  <!-- Roof / cabin -->
  <rect x="22" y="20" width="20" height="18" rx="5" ry="5" fill="#5dade2"/>
  <!-- Windshield (front) -->
  <rect x="24" y="16" width="16" height="8" rx="3" ry="3" fill="#85c1e9" opacity="0.8"/>
  <!-- Rear window -->
  <rect x="24" y="38" width="16" height="6" rx="3" ry="3" fill="#85c1e9" opacity="0.6"/>
  <!-- Left front tire -->
  <rect x="12" y="14" width="8" height="12" rx="3" ry="3" fill="#2c3e50"/>
  <!-- Right front tire -->
  <rect x="44" y="14" width="8" height="12" rx="3" ry="3" fill="#2c3e50"/>
  <!-- Left rear tire -->
  <rect x="12" y="38" width="8" height="12" rx="3" ry="3" fill="#2c3e50"/>
  <!-- Right rear tire -->
  <rect x="44" y="38" width="8" height="12" rx="3" ry="3" fill="#2c3e50"/>
  <!-- Headlights -->
  <circle cx="26" cy="10" r="2.5" fill="#f1c40f"/>
  <circle cx="38" cy="10" r="2.5" fill="#f1c40f"/>
  <!-- Taillights -->
  <circle cx="26" cy="54" r="2" fill="#e74c3c" stroke="#c0392b" stroke-width="1"/>
  <circle cx="38" cy="54" r="2" fill="#e74c3c" stroke="#c0392b" stroke-width="1"/>
</svg>
